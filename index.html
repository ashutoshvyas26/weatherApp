<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>
    
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="title">WeatherHub</h1>
            <p class="subtitle">Real-time weather at your fingertips</p>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-wrapper">
                <form id="searchForm" class="search-form">
                    <input 
                        type="text" 
                        id="city" 
                        class="search-input" 
                        placeholder="Search a city..." 
                        autocomplete="off"
                    >
                    <button type="submit" class="search-btn">
                        <span class="btn-text">Search</span>
                        <span class="btn-icon">→</span>
                    </button>
                </form>
                <div id="suggestionsDropdown" class="suggestions-dropdown"></div>
            </div>
            <div id="errorMsg" class="error-message"></div>
        </div>

        <!-- Main Weather Display -->
        <div class="weather-container" id="weatherContainer">
            <div class="location-header">
                <h2 id="cityName" class="city-name"></h2>
                <p id="currentTime" class="current-time"></p>
            </div>

            <!-- Primary Card -->
            <div class="weather-main-card">
                <div class="main-temp-section">
                    <div class="temp-display">
                        <span id="temp" class="main-temp">--</span>
                        <span class="degree-symbol">°C</span>
                    </div>
                    <img id="weatherIcon" class="weather-icon-main" src="" alt="Weather icon">
                </div>
                <p id="description" class="weather-description">--</p>
                <p id="feelsLike" class="feels-like">Feels like --°C</p>
            </div>

            <!-- Hourly Forecast -->
            <div class="forecast-section hourly-section" id="hourlySection">
                <div class="hourly-forecast" id="hourlyForecast">
                    <!-- Hourly cards will be inserted here -->
                </div>
            </div>

            <!-- Weekly Forecast -->
            <div class="forecast-section weekly-section" id="weeklySection">
                <div class="daily-forecast" id="dailyForecast">
                    <!-- Daily cards will be inserted here -->
                </div>
            </div>

            <!-- Insights Section -->
            <div class="insights">
                <h3 class="section-title">Weather Wisdom</h3>
                <div class="insights-grid">
                    <div class="insight-card">
                        <div class="insight-title">Commuter Window</div>
                        <div class="insight-value" id="commuterWindow">--</div>
                        <div class="insight-meta" id="commuterWindowMeta">--</div>
                    </div>

                    <div class="insight-card">
                        <div class="insight-title">Clothing Hint</div>
                        <div class="insight-value" id="clothingHint">--</div>
                        <div class="insight-meta" id="clothingHintMeta">--</div>
                    </div>

                    <div class="insight-card">
                        <div class="insight-title">Rain Start/Stop</div>
                        <div class="insight-value" id="rainTimer">--</div>
                        <div class="insight-meta" id="rainTimerMeta">--</div>
                    </div>

                    <div class="insight-card">
                        <div class="insight-title">Cold Exposure Timer</div>
                        <div class="insight-value" id="coldExposure">--</div>
                        <div class="insight-meta" id="coldExposureMeta">--</div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>Weather data powered by <a href="https://openweathermap.org/" target="_blank">OpenWeather API</a> | <a href="https://github.com/ashutoshvyas26/weatherApp" target="_blank">GitHub</a></p>
        <p>&copy; 2026 WeatherHub. All rights reserved.</p>
    </footer>

    <!-- GSAP Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- API Configuration -->
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
